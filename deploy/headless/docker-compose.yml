services:
  redroid:
    image: redroid/redroid:13.0.0-latest
    container_name: rikkahub-redroid
    privileged: true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - rikkahub-data:/data
    ports:
      - "${RIKKAHUB_PORT:-8080}:8080"
    command: >
      androidboot.use_adb_over_tcp=1
      androidboot.hardware.redroid_gpu=guest
      redroid_use_vsock=0
      androidboot.redroid_arch=x86_64
    healthcheck:
      test: ["CMD-SHELL", "getprop sys.boot_completed | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  manager:
    build:
      context: ../..
      dockerfile: deploy/headless/manager/Dockerfile
    container_name: rikkahub-manager
    restart: unless-stopped
    depends_on:
      redroid:
        condition: service_healthy
    volumes:
      - ./logs:/logs
    environment:
      - REDROID_HOST=redroid
      - PORT=8080
      - PACKAGE=me.rerere.rikkahub.debug
      - APK_PATH=/opt/rikkahub.apk
      - HOOK_SCRIPT=/opt/frida/rikkahub-headless.js
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://redroid:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  rikkahub-data:
